<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lashes by Lia Dashboard</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f7ebe7 0%, #efe0da 100%);
    }
    .login-box {
      background: white;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 16px 48px rgba(38, 27, 20, 0.12);
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .login-logo p {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(35, 31, 28, 0.12);
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(183, 143, 133, 0.12);
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .error-message {
      background: rgba(220, 38, 38, 0.08);
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    .back-link a {
      color: var(--accent-dark);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <h1>Lashes by Lia</h1>
        <p>Dashboard Login</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input type="email" id="email" name="email" required placeholder="deine@email.de">
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" required placeholder="Dein Passwort">
        </div>
        <button type="submit" class="btn btn-primary btn-login">Anmelden</button>
      </form>

      <div class="back-link">
        <a href="/">&larr; Zurück zur Website</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.remove('show');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok && data.success) {
          window.location.href = '/dashboard';
        } else {
          errorMessage.textContent = data.error || 'Anmeldung fehlgeschlagen';
          errorMessage.classList.add('show');
        }
      } catch (error) {
        errorMessage.textContent = 'Verbindungsfehler. Bitte versuche es erneut.';
        errorMessage.classList.add('show');
      }
    });
  </script>
</body>
</html>
